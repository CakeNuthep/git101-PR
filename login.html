<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">
        <div class="lang-switcher">
            <button class="lang-btn" id="langBtn">TH</button>
        </div>

        <h2 id="titleText">Login</h2>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label id="userLabel" for="username">Email Username</label>
                <input type="email" id="username" autocomplete="username">
                <span class="error-msg" id="userError"></span>
            </div>

            <div class="form-group">
                <label id="passLabel" for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password">
                <span class="error-msg" id="passError"></span>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">Sign In</button>
        </form>

        <div>test test hello 1234</div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
